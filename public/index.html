<!DOCTYPE html>
<html>
<head>
  <title>KMRL TCS Break Register</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">

<h1>KMRL TCS BREAK REGISTER</h1>

<input type="text" id="emp_id" placeholder="Enter Employee ID">

<select id="break_no">
  <option value="Break 1">Break 1</option>
  <option value="Break 2">Break 2</option>
  <option value="Break 3">Break 3</option>
  <option value="Break 4">Break 4</option>
  <option value="Break 5">Break 5</option>
  <option value="Break 6">Break 6</option>
</select>

<button onclick="submitBreak('START')">
  START BREAK
</button>

<button onclick="submitBreak('COMPLETE')">
  COMPLETE BREAK
</button>

</div>

<script src="script.js"></script>

</body>
</html>
