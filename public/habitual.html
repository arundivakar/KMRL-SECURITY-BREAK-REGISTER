<!DOCTYPE html>
<html>

<head>

<title>Habitual Offenders</title>

<link rel="stylesheet"
href="admin.css">

</head>

<body>

<div class="dashboard">

<div style="
display:flex;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
">

<a href="/dashboard">

<button>
Dashboard
</button>

</a>

<a href="/today-exceeded">

<button>
Today's Extra Breaks
</button>

</a>

<a href="/habitual-offenders">

<button>
Habitual Offenders
</button>

</a>

<a href="/logout">

<button>
Logout
</button>

</a>

</div>

<input
type="text"
id="searchInput"
placeholder="Enter EMP ID"
oninput="loadHabitual()"
style="
padding:10px;
font-size:16px;
margin-bottom:15px;
width:250px;
border-radius:6px;
"
/>

<h2>Habitual Offenders</h2>

<table>

<thead>

<tr>

<th>EMP ID</th>
<th>Name</th>
<th>Exceeded Count</th>
<th>Latest Date</th>
<th>Latest Station</th>

</tr>

</thead>

<tbody id="logs-body"></tbody>

</table>

<br>

<div style="
display:flex;
gap:10px;
align-items:center;
">

<button onclick="prevPage()">
Previous
</button>

<span id="page-info"></span>

<button onclick="nextPage()">
Next
</button>

</div>

</div>

<script src="habitual.js"></script>

</body>
</html>
