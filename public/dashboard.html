<!DOCTYPE html>
<html>

<head>

<title>KMRL Dashboard</title>

<link rel="stylesheet"
href="admin.css">

</head>

<body>

<div class="dashboard">

<!-- ===== TOP MENU ===== -->

<div style="
display:flex;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
">

<a href="/dashboard">

<button>

Dashboard

</button>

</a>

<a href="/today-exceeded">

<button>

Today's Extra Breaks

</button>

</a>

<a href="/habitual-offenders">

<button>

Habitual Offenders

</button>

</a>

<a href="/logout">

<button>

Logout

</button>

</a>

</div>

<!-- ===== FILTER + SEARCH ===== -->

<div style="
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
">

<div style="
display:flex;
gap:15px;
flex-wrap:wrap;
align-items:stretch;
">

<select id="stationFilter"
onchange="loadLogs()"
style="
padding:12px 18px;
font-size:15px;
border-radius:8px;
border:1px solid #dcdcdc;
width:240px;
height:48px;
box-sizing:border-box;
">

<option value="">
ALL STATIONS
</option>

<option value="ALVA">ALVA</option>
<option value="PNCU">PNCU</option>
<option value="CPPY">CPPY</option>
<option value="AATK">AATK</option>
<option value="MUTT">MUTT</option>
<option value="KLMT">KLMT</option>
<option value="CCUV">CCUV</option>
<option value="PDPM">PDPM</option>
<option value="EDAP">EDAP</option>
<option value="CGPP">CGPP</option>
<option value="PARV">PARV</option>
<option value="JLSD">JLSD</option>
<option value="KALR">KALR</option>
<option value="TNHL">TNHL</option>
<option value="MGRD">MGRD</option>
<option value="MACE">MACE</option>
<option value="ERSH">ERSH</option>
<option value="KVTR">KVTR</option>
<option value="EMKM">EMKM</option>
<option value="VYTA">VYTA</option>
<option value="TKDM">TKDM</option>
<option value="PETT">PETT</option>
<option value="VAKK">VAKK</option>
<option value="SNJN">SNJN</option>
<option value="TPHT">TPHT</option>

</select>

<input
type="text"
id="searchInput"
placeholder="Search EMP ID / Name / Station"
style="
padding:12px 18px;
font-size:15px;
border-radius:8px;
border:1px solid #dcdcdc;
width:240px;
height:48px;
box-sizing:border-box;
"
onkeydown="
if(event.key==='Enter'){
loadLogs();
}
"
/>

<button
onclick="
currentPage = 1;
loadLogs();
"
style="
height:48px;
padding:0 24px;
">
Search

</button>

</div>

</div>

<!-- ===== SUMMARY CARDS ===== -->

<div class="stats-grid">

<div class="stat-card">

<h3>Total Logs</h3>

<h1 id="totalLogs">0</h1>

</div>

<div class="stat-card">

<h3>Break Exceeded</h3>

<h1 id="totalExceeded">0</h1>

</div>

<div class="stat-card">

<h3>Running Breaks</h3>

<h1 id="runningBreaks">0</h1>

</div>


</div>

<!-- ===== TITLE ===== -->

<h2>KMRL Break Logs</h2>

<!-- ===== TABLE ===== -->

<table>

<thead>

<tr>

<th>Date</th>
<th>EMP ID</th>
<th>Name</th>
<th>Station</th>
<th>Shift</th>
<th>Session</th>

<th>B1</th>
<th>B2</th>
<th>B3</th>
<th>B4</th>
<th>B5</th>
<th>B6</th>

<th>Total</th>

<th>Status</th>

<th>Edit</th>

</tr>

</thead>

<tbody id="logs-body"></tbody>

</table>

<br>

<!-- ===== PAGINATION ===== -->

<div style="
display:flex;
gap:10px;
align-items:center;
">

<button onclick="prevPage()">

Previous

</button>

<span id="page-info"></span>

<button onclick="nextPage()">

Next

</button>

</div>

</div>

<script src="admin.js"></script>

</body>

</html>
