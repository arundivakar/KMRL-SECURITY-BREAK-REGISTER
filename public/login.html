<!DOCTYPE html>
<html>

<head>

<title>KMRL Admin Login</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

/* ===== BODY ===== */

body {

    margin: 0;

    padding: 0;

    font-family:
    'Segoe UI',
    sans-serif;

    background:
    linear-gradient(
        135deg,
        #0097a7,
        #005f6b
    );

    display:
    flex;

    justify-content:
    center;

    align-items:
    center;

    min-height:
    100vh;

    overflow:
    hidden;
}

/* ===== BACKGROUND GLOW ===== */

body::before {

    content: '';

    position:
    absolute;

    width:
    500px;

    height:
    500px;

    background:
    rgba(255,255,255,0.08);

    border-radius:
    50%;

    top:
    -120px;

    right:
    -120px;

    filter:
    blur(20px);
}

body::after {

    content: '';

    position:
    absolute;

    width:
    400px;

    height:
    400px;

    background:
    rgba(183,213,51,0.12);

    border-radius:
    50%;

    bottom:
    -120px;

    left:
    -120px;

    filter:
    blur(20px);
}

/* ===== LOGIN CARD ===== */

.login-box {

    position:
    relative;

    z-index:
    10;

    width:
    92%;

    max-width:
    400px;

    background:
    rgba(255,255,255,0.96);

    backdrop-filter:
    blur(10px);

    border-radius:
    22px;

    padding:
    35px;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.18);

    box-sizing:
    border-box;
}

/* ===== LOGO ===== */

.logo {

    width:
    80px;

    height:
    80px;

    margin:
    0 auto 20px;

    border-radius:
    20px;

    background:
    linear-gradient(
        135deg,
        #0097a7,
        #00707d
    );

    display:
    flex;

    align-items:
    center;

    justify-content:
    center;

    color:
    white;

    font-size:
    30px;

    font-weight:
    bold;

    box-shadow:
    0 8px 20px rgba(0,151,167,0.25);
}

/* ===== TITLES ===== */

h2 {

    margin:
    0;

    text-align:
    center;

    color:
    #1f2937;

    font-size:
    28px;
}

.subtitle {

    text-align:
    center;

    margin-top:
    10px;

    color:
    #6b7280;

    font-size:
    14px;

    margin-bottom:
    30px;
}

/* ===== INPUTS ===== */

input {

    width:
    100%;

    height:
    52px;

    margin-top:
    16px;

    padding:
    0 16px;

    border:
    2px solid #ddeeee;

    border-radius:
    14px;

    font-size:
    15px;

    box-sizing:
    border-box;

    transition:
    0.25s;

    background:
    white;
}

input:focus {

    outline:
    none;

    border-color:
    #0097a7;

    box-shadow:
    0 0 12px rgba(0,151,167,0.15);
}

/* ===== BUTTON ===== */

button {

    width:
    100%;

    height:
    52px;

    margin-top:
    22px;

    border:
    none;

    border-radius:
    14px;

    background:
    linear-gradient(
        135deg,
        #0097a7,
        #00707d
    );

    color:
    white;

    font-size:
    15px;

    font-weight:
    700;

    cursor:
    pointer;

    transition:
    0.25s;
}

button:hover {

    transform:
    translateY(-1px);

    box-shadow:
    0 8px 18px rgba(0,151,167,0.25);
}

/* ===== MESSAGE ===== */

#message {

    margin-top:
    16px;

    text-align:
    center;

    color:
    #dc2626;

    font-size:
    14px;

    font-weight:
    600;
}

/* ===== FOOTER ===== */

.footer {

    text-align:
    center;

    margin-top:
    28px;

    font-size:
    12px;

    color:
    #888;
}

/* ===== MOBILE ===== */

@media(max-width:480px){

    .login-box {

        padding:
        25px;
    }

    h2 {

        font-size:
        24px;
    }
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

K

</div>

<h2>

KMRL Portal

</h2>

<div class="subtitle">

Security Break Monitoring System

</div>

<input
type="text"
id="username"
placeholder="Username"
>

<input
type="password"
id="password"
placeholder="Password"
onkeydown="
if(event.key==='Enter'){
login();
}
"
>

<button onclick="login()">

LOGIN

</button>

<div id="message"></div>

<div class="footer">

Kochi Metro Rail Ltd • Control Room Access

</div>

</div>

<script src="login.js"></script>

</body>

</html>
